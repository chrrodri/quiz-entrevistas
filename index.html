<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NTT DATA Interview Quiz | Study App</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --panel: #ffffff;
      --panel-2: #f0f3f8;
      --text: #18202f;
      --muted: #657184;
      --line: #d9e0eb;
      --strong: #0e3b56;
      --accent: #1976a3;
      --accent-2: #0f8f7e;
      --danger: #b42335;
      --warning: #b76b00;
      --success: #117348;
      --success-bg: #e7f6ef;
      --danger-bg: #fdecef;
      --warning-bg: #fff4dd;
      --focus: rgba(25, 118, 163, .24);
      --shadow: 0 18px 50px rgba(23, 36, 57, .12);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(15, 143, 126, .08), transparent 260px),
        var(--bg);
      color: var(--text);
    }

    button, input, select { font: inherit; }
    button { -webkit-tap-highlight-color: transparent; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
    }

    .sidebar {
      background: #102536;
      color: #f8fbff;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255,255,255,.12);
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #f8fbff;
      color: #102536;
      font-weight: 800;
      letter-spacing: .04em;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .brand p {
      margin: 3px 0 0;
      color: rgba(248,251,255,.72);
      font-size: 13px;
    }

    .side-section {
      display: grid;
      gap: 10px;
    }

    .side-title {
      font-size: 12px;
      color: rgba(248,251,255,.62);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .mode-list {
      display: grid;
      gap: 8px;
    }

    .mode-button, .category-button, .plain-button, .primary-button, .ghost-button, .option-button {
      border: 0;
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform .12s ease, background .12s ease, border-color .12s ease, box-shadow .12s ease;
    }

    .mode-button {
      text-align: left;
      background: rgba(255,255,255,.08);
      color: #f8fbff;
      padding: 12px;
      border: 1px solid rgba(255,255,255,.12);
    }

    .mode-button:hover, .mode-button.active {
      background: rgba(255,255,255,.16);
      border-color: rgba(255,255,255,.32);
    }

    .mode-button strong {
      display: block;
      font-size: 14px;
      margin-bottom: 3px;
    }

    .mode-button span {
      display: block;
      color: rgba(248,251,255,.70);
      font-size: 12px;
      line-height: 1.35;
    }

    .side-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .stat {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: var(--radius);
      padding: 10px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 750;
    }

    .stat-label {
      color: rgba(248,251,255,.66);
      font-size: 12px;
      margin-top: 2px;
    }

    .main {
      padding: 28px;
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
    }

    .title-block h2 {
      margin: 0;
      font-size: clamp(24px, 3vw, 36px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .title-block p {
      margin: 7px 0 0;
      color: var(--muted);
      line-height: 1.45;
      max-width: 760px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .primary-button, .plain-button, .ghost-button {
      min-height: 40px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      white-space: nowrap;
    }

    .primary-button {
      background: var(--strong);
      color: white;
    }

    .plain-button {
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--text);
    }

    .ghost-button {
      background: transparent;
      color: var(--muted);
      border: 1px solid transparent;
    }

    .primary-button:hover, .plain-button:hover, .ghost-button:hover, .option-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(23, 36, 57, .10);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .setup {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 0;
      overflow: hidden;
    }

    .setup-main, .setup-aside {
      padding: 22px;
    }

    .setup-aside {
      background: var(--panel-2);
      border-left: 1px solid var(--line);
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .section-heading {
      margin: 0 0 12px;
      font-size: 15px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 10px;
    }

    .category-button {
      text-align: left;
      background: var(--panel);
      border: 1px solid var(--line);
      min-height: 78px;
      padding: 12px;
      color: var(--text);
    }

    .category-button.active {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px var(--accent);
      background: #eef8fb;
    }

    .category-button strong {
      display: block;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .category-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .select-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .range-row {
      display: grid;
      gap: 7px;
    }

    .range-row label {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 13px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .quiz-shell {
      display: grid;
      gap: 14px;
    }

    .progress-card {
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 13px;
      gap: 12px;
    }

    .progress-track {
      height: 9px;
      border-radius: 999px;
      background: var(--panel-2);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width .25s ease;
    }

    .question-card {
      padding: 24px;
      display: grid;
      gap: 18px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 9px;
      border-radius: 999px;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .chip.hot {
      background: var(--warning-bg);
      color: var(--warning);
    }

    .question-text {
      font-size: clamp(19px, 2.4vw, 28px);
      line-height: 1.28;
      font-weight: 760;
      margin: 0;
      letter-spacing: 0;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option-button {
      width: 100%;
      text-align: left;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 11px;
      align-items: start;
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 14px;
      line-height: 1.45;
    }

    .option-key {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--panel-2);
      color: var(--muted);
      font-weight: 800;
    }

    .option-button.correct {
      border-color: var(--success);
      background: var(--success-bg);
    }

    .option-button.correct .option-key {
      background: var(--success);
      color: white;
    }

    .option-button.wrong {
      border-color: var(--danger);
      background: var(--danger-bg);
    }

    .option-button.wrong .option-key {
      background: var(--danger);
      color: white;
    }

    .option-button.dimmed {
      opacity: .62;
    }

    .feedback {
      display: none;
      border-radius: var(--radius);
      padding: 14px;
      line-height: 1.55;
      border: 1px solid;
    }

    .feedback.show { display: block; }
    .feedback.correct {
      background: var(--success-bg);
      border-color: rgba(17, 115, 72, .25);
      color: #0d5134;
    }
    .feedback.wrong {
      background: var(--danger-bg);
      border-color: rgba(180, 35, 53, .25);
      color: #70202a;
    }
    .feedback.neutral {
      background: var(--panel-2);
      border-color: var(--line);
      color: var(--text);
    }

    .actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .study-answer {
      display: none;
      padding: 16px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      line-height: 1.55;
    }

    .study-answer.show { display: block; }
    .answer-label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 7px;
    }

    .results {
      padding: 24px;
      display: grid;
      gap: 18px;
    }

    .score-hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }

    .score-number {
      font-size: clamp(42px, 8vw, 78px);
      font-weight: 850;
      line-height: .95;
      color: var(--strong);
      letter-spacing: 0;
    }

    .score-copy h3 {
      margin: 0;
      font-size: 24px;
    }

    .score-copy p {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .breakdown {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }

    .breakdown-item {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: var(--panel);
      display: grid;
      gap: 8px;
    }

    .breakdown-name {
      font-weight: 750;
      line-height: 1.25;
    }

    .mini-track {
      height: 7px;
      background: var(--panel-2);
      border-radius: 999px;
      overflow: hidden;
    }

    .mini-fill {
      height: 100%;
      background: var(--accent-2);
      border-radius: inherit;
    }

    .review-list {
      display: grid;
      gap: 10px;
    }

    .review-item {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      background: var(--panel);
    }

    .review-item strong {
      display: block;
      margin-bottom: 7px;
    }

    .review-item p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .empty {
      padding: 22px;
      border: 1px dashed var(--line);
      color: var(--muted);
      border-radius: var(--radius);
      text-align: center;
      background: rgba(255,255,255,.5);
    }

    :focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    @media (max-width: 920px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: static; padding: 18px; }
      .side-stats { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .main { padding: 18px; }
      .setup { grid-template-columns: 1fr; }
      .setup-aside { border-left: 0; border-top: 1px solid var(--line); }
      .topbar { align-items: flex-start; flex-direction: column; }
      .toolbar { justify-content: flex-start; }
    }

    @media (max-width: 560px) {
      .side-stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .brand-mark { width: 38px; height: 38px; }
      .category-grid { grid-template-columns: 1fr; }
      .question-card, .results, .setup-main, .setup-aside { padding: 16px; }
      .score-hero { align-items: flex-start; flex-direction: column; }
      .option-button { grid-template-columns: 30px minmax(0, 1fr); padding: 12px; }
      .option-key { width: 30px; height: 30px; }
      .primary-button, .plain-button, .ghost-button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">NTT</div>
        <div>
          <h1>Interview Study App</h1>
          <p>L2/L3 Production Support</p>
        </div>
      </div>

      <section class="side-section">
        <div class="side-title">Modo</div>
        <div class="mode-list" id="modeList"></div>
      </section>

      <section class="side-section">
        <div class="side-title">Tu avance</div>
        <div class="side-stats">
          <div class="stat">
            <div class="stat-value" id="statTotal">0</div>
            <div class="stat-label">Preguntas</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="statHot">0</div>
            <div class="stat-label">Clave</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="statBest">0%</div>
            <div class="stat-label">Mejor score</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="statSeen">0</div>
            <div class="stat-label">Vistas</div>
          </div>
        </div>
      </section>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="title-block">
          <h2 id="pageTitle">Prepara tu entrevista con foco</h2>
          <p id="pageSubtitle">Elige modo, filtra categorías y estudia con feedback inmediato o simulacro completo.</p>
        </div>
        <div class="toolbar">
          <button class="plain-button" id="resetProgressButton" type="button">Reiniciar progreso</button>
          <button class="primary-button" id="startButton" type="button">Comenzar</button>
        </div>
      </header>

      <section id="screen"></section>
    </main>
  </div>

  <script>
    const ALL_QUESTIONS = [
  // ── CI/CD & DevOps ──────────────────────────────────────────────
  {
    cat: "CI/CD & DevOps",
    q: "¿Qué significa CI en el contexto de CI/CD pipelines?",
    opts: ["Continuous Installation", "Continuous Integration", "Cloud Infrastructure", "Controlled Input"],
    ans: 1,
    exp: "CI = Continuous Integration. Es la práctica de hacer merges frecuentes al repositorio compartido para detectar problemas de integración temprano mediante builds y tests automatizados.",
    tip: false
  },
  {
    cat: "CI/CD & DevOps",
    q: "¿Cuál de los siguientes es un archivo de configuración propio de Jenkins?",
    opts: ["docker-compose.yml", "Jenkinsfile", "terraform.tfstate", ".gitlab-ci.yml"],
    ans: 1,
    exp: "Jenkinsfile es el archivo donde se define el pipeline de Jenkins usando sintaxis declarativa o scripted. Es la base del enfoque 'Pipeline as Code'.",
    tip: false
  },
  {
    cat: "CI/CD & DevOps",
    q: "¿Cuál es la diferencia entre Continuous Delivery y Continuous Deployment?",
    opts: [
      "Son exactamente lo mismo, solo difieren en el nombre",
      "Continuous Delivery requiere aprobación manual antes del deploy a producción; Continuous Deployment lo hace de forma automática al pasar el pipeline",
      "Continuous Deployment es solo para entornos de desarrollo; Delivery es para producción",
      "Continuous Delivery usa Jenkins; Continuous Deployment usa GitLab"
    ],
    ans: 1,
    exp: "Continuous Delivery prepara y valida el código para producción automáticamente, pero el deploy requiere un trigger manual (aprobación humana). Continuous Deployment va un paso más: cada cambio que pasa el pipeline se despliega a producción de forma totalmente automática.",
    tip: false
  },
  {
    cat: "CI/CD & DevOps",
    q: "En un pipeline de Jenkins, ¿qué ventaja ofrece la ejecución paralela de stages?",
    opts: [
      "Permite usar menos memoria en el servidor de Jenkins",
      "Reduce el tiempo total del pipeline al ejecutar tareas independientes simultáneamente",
      "Garantiza que los tests unitarios siempre pasen",
      "Elimina la necesidad de un Jenkinsfile"
    ],
    ans: 1,
    exp: "La ejecución paralela de stages en Jenkins permite que tareas independientes (por ejemplo, tests unitarios y análisis de código estático) se ejecuten al mismo tiempo, reduciendo significativamente el tiempo total del pipeline y acelerando el feedback al desarrollador.",
    tip: true
  },
  {
    cat: "CI/CD & DevOps",
    q: "¿Qué es Terraform y para qué se usa en un contexto DevOps?",
    opts: [
      "Una herramienta para crear diagramas de arquitectura cloud",
      "Un sistema de monitoreo de infraestructura en tiempo real",
      "Una herramienta de Infrastructure as Code que permite provisionar y gestionar recursos cloud de forma declarativa",
      "Un gestor de paquetes para proyectos Java"
    ],
    ans: 2,
    exp: "Terraform es una herramienta de Infrastructure as Code (IaC) de HashiCorp. Permite definir recursos de cloud (EC2, S3, VPCs, IAM) en archivos declarativos HCL, y aprovisionar o modificar esa infraestructura de forma reproducible y versionada. Es fundamental en pipelines DevOps modernos.",
    tip: true
  },
  // ── Git ──────────────────────────────────────────────────────────
  {
    cat: "Git",
    q: "En GitFlow, ¿en qué rama se integran los feature branches antes de hacer un release?",
    opts: ["main", "hotfix", "develop", "release"],
    ans: 2,
    exp: "En GitFlow, la rama 'develop' es la rama de integración donde se fusionan los feature branches. Solo después de estabilizar develop se crea una release branch.",
    tip: false
  },
  {
    cat: "Git",
    q: "¿Para qué se usan las hotfix branches en GitFlow?",
    opts: [
      "Para desarrollar nuevas funcionalidades urgentes",
      "Para aplicar correcciones urgentes directamente sobre main/master sin pasar por develop",
      "Para hacer merge de varias feature branches a la vez",
      "Para sincronizar el repositorio remoto con el local"
    ],
    ans: 1,
    exp: "Las hotfix branches en GitFlow sirven para corregir bugs críticos en producción de forma urgente. Se crean desde main/master, se corrige el bug, y se mergean tanto a main como a develop para que la corrección no se pierda en el siguiente release.",
    tip: false
  },
  {
    cat: "Git",
    q: "¿Qué hace 'git rebase' y por qué se prefiere sobre 'git merge' en algunos flujos de trabajo?",
    opts: [
      "Rebase elimina todos los commits anteriores del branch",
      "Rebase reaplica los commits de tu branch sobre la punta del branch destino, generando un historial más lineal y limpio",
      "Rebase es igual a merge pero más lento",
      "Rebase solo funciona en repositorios privados"
    ],
    ans: 1,
    exp: "Git rebase mueve o reaplica commits de un branch sobre otro, creando un historial de commits lineal sin 'merge commits' extra. Se prefiere en equipos que quieren un historial limpio y fácil de leer. Sin embargo, nunca se debe hacer rebase de ramas públicas compartidas.",
    tip: true
  },
  // ── Linux ────────────────────────────────────────────────────────
  {
    cat: "Linux",
    q: "¿Qué comando de Linux usarías para analizar el uso de CPU en tiempo real por proceso?",
    opts: ["df -h", "netstat -tulnp", "top / htop", "journalctl -u"],
    ans: 2,
    exp: "'top' y 'htop' muestran los procesos activos ordenados por uso de CPU y memoria en tiempo real. Son los primeros comandos a usar al diagnosticar un servidor lento.",
    tip: false
  },
  {
    cat: "Linux",
    q: "¿Cuál es la sintaxis correcta de un cron job que ejecuta un script todos los días a las 2 AM?",
    opts: ["2 0 * * * /script.sh", "0 2 * * * /script.sh", "* * 2 * * /script.sh", "0 * 2 * * /script.sh"],
    ans: 1,
    exp: "La sintaxis CRON es: minuto hora día mes día_semana. Para las 2:00 AM diariamente: '0 2 * * *' — 0 minutos, hora 2, todos los días.",
    tip: false
  },
  {
    cat: "Linux",
    q: "¿Qué hace el siguiente comando? grep 'ERROR' /var/log/app.log | awk '{print $1, $2}' | sort | uniq -c | sort -rn",
    opts: [
      "Elimina líneas con ERROR del log y las guarda en un archivo nuevo",
      "Busca ERRORs, extrae fecha y hora, cuenta ocurrencias únicas y ordena de mayor a menor",
      "Reinicia el servicio cuando detecta errores en el log",
      "Lista todos los archivos de log que contienen la palabra ERROR"
    ],
    ans: 1,
    exp: "Este pipeline: busca líneas con 'ERROR', extrae los dos primeros campos (timestamp), cuenta cuántas veces aparece cada combinación única y ordena de mayor a menor frecuencia. Muy útil para análisis de logs en producción.",
    tip: false
  },
  {
    cat: "Linux",
    q: "¿Cuál es la diferencia entre 'ps aux' y 'top' al diagnosticar un servidor?",
    opts: [
      "ps aux muestra procesos de red; top muestra procesos de disco",

        desc: "Tarjetas de estudio con respuesta y explicación a demanda.",
        title: "Repaso tipo flashcard",
        subtitle: "Lee la pregunta, piensa tu respuesta y revela la explicación."
      },
      hot: {
        label: "Preguntas clave",
        desc: "Solo las marcadas como más probables para entrevista real.",
        title: "Preguntas de alta probabilidad",
        subtitle: "Un circuito corto para practicar lo más preguntable del rol."
      }
    };

    const STORAGE_KEY = "ntt-data-study-app-v1";
    const categories = [...new Set(ALL_QUESTIONS.map(q => q.cat))];
    const defaultState = {
      mode: "practice",
      selectedCategories: categories,
      questionLimit: Math.min(20, ALL_QUESTIONS.length),
      queue: [],
      index: 0,
      answers: [],
      currentAnswered: false,
      bestScore: 0,
      seen: 0,
      active: false,
      showStudyAnswer: false
    };

    let state = loadState();

    const screen = document.getElementById("screen");
    const modeList = document.getElementById("modeList");
    const pageTitle = document.getElementById("pageTitle");
    const pageSubtitle = document.getElementById("pageSubtitle");
    const startButton = document.getElementById("startButton");
    const resetProgressButton = document.getElementById("resetProgressButton");

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved) return structuredClone(defaultState);
        return {
          ...structuredClone(defaultState),
          ...saved,
          selectedCategories: Array.isArray(saved.selectedCategories) && saved.selectedCategories.length
            ? saved.selectedCategories.filter(c => categories.includes(c))
            : categories
        };
      } catch {
        return structuredClone(defaultState);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      updateStats();
    }

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function getPool() {
      const base = state.mode === "hot"
        ? ALL_QUESTIONS.filter(q => q.tip)
        : ALL_QUESTIONS.filter(q => state.selectedCategories.includes(q.cat));
      return base.length ? base : ALL_QUESTIONS;
    }

    function getQuestionId(q) {
      return ALL_QUESTIONS.indexOf(q);
    }

    function getQuestionById(id) {
      return ALL_QUESTIONS[id];
    }

    function categoryCount(cat) {
      return ALL_QUESTIONS.filter(q => q.cat === cat).length;
    }

    function categoryHotCount(cat) {
      return ALL_QUESTIONS.filter(q => q.cat === cat && q.tip).length;
    }

    function renderModes() {
      modeList.innerHTML = Object.entries(MODES).map(([key, mode]) => `
        <button class="mode-button ${state.mode === key ? "active" : ""}" type="button" data-mode="${key}">
          <strong>${mode.label}</strong>
          <span>${mode.desc}</span>
        </button>
      `).join("");

      modeList.querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          state.mode = button.dataset.mode;
          state.active = false;
          saveState();
          renderApp();
        });
      });
    }

    function updateStats() {
      document.getElementById("statTotal").textContent = ALL_QUESTIONS.length;
      document.getElementById("statHot").textContent = ALL_QUESTIONS.filter(q => q.tip).length;
      document.getElementById("statBest").textContent = Math.round(state.bestScore || 0) + "%";
      document.getElementById("statSeen").textContent = state.seen || 0;
    }

    function renderSetup() {
      const mode = MODES[state.mode];
      pageTitle.textContent = mode.title;
      pageSubtitle.textContent = mode.subtitle;
      startButton.textContent = state.active ? "Continuar" : "Comenzar";
      startButton.style.display = "inline-flex";

      const pool = getPool();
      const limit = Math.min(state.questionLimit, pool.length);
      state.questionLimit = limit || Math.min(20, ALL_QUESTIONS.length);

      screen.innerHTML = `
        <div class="panel setup">
          <div class="setup-main">
            <h3 class="section-heading">Categorías</h3>
            <div class="select-row">
              <button class="plain-button" type="button" id="selectAllButton">Todas</button>
              <button class="plain-button" type="button" id="selectHotButton">Solo clave</button>
              <button class="ghost-button" type="button" id="clearButton">Limpiar</button>
            </div>
            <div class="category-grid">
              ${categories.map(cat => `
                <button class="category-button ${state.selectedCategories.includes(cat) ? "active" : ""}" type="button" data-cat="${escapeAttr(cat)}">
                  <strong>${escapeHtml(cat)}</strong>
                  <span class="category-meta">
                    <span>${categoryCount(cat)} preguntas</span>
                    <span>${categoryHotCount(cat)} clave</span>
                  </span>
                </button>
              `).join("")}
            </div>
          </div>
          <aside class="setup-aside">
            <h3 class="section-heading">Sesión</h3>
            <div class="range-row">
              <label for="limitRange">
                <span>Preguntas</span>
                <strong id="limitLabel">${limit}</strong>
              </label>
              <input id="limitRange" type="range" min="1" max="${Math.max(1, pool.length)}" value="${limit}">
            </div>
            <div class="empty">
              ${pool.length} preguntas disponibles con el filtro actual.
            </div>
            <button class="primary-button" type="button" id="startSessionButton">Iniciar sesión</button>
          </aside>
        </div>
      `;

      document.getElementById("selectAllButton").addEventListener("click", () => {
        state.selectedCategories = categories;
        state.active = false;
        saveState();
        renderApp();
      });

      document.getElementById("selectHotButton").addEventListener("click", () => {
        state.mode = "hot";
        state.active = false;
        saveState();
        renderApp();
      });

      document.getElementById("clearButton").addEventListener("click", () => {
        state.selectedCategories = [];
        state.active = false;
        saveState();
        renderApp();
      });

      document.querySelectorAll(".category-button").forEach(button => {
        button.addEventListener("click", () => {
          const cat = button.dataset.cat;
          const selected = new Set(state.selectedCategories);
          selected.has(cat) ? selected.delete(cat) : selected.add(cat);
          state.selectedCategories = [...selected];
          state.mode = state.mode === "hot" ? "practice" : state.mode;
          state.active = false;
          saveState();
          renderApp();
        });
      });

      const range = document.getElementById("limitRange");
      range.addEventListener("input", () => {
        state.questionLimit = Number(range.value);
        document.getElementById("limitLabel").textContent = range.value;
        saveState();
      });

      document.getElementById("startSessionButton").addEventListener("click", startSession);
    }

    function startSession() {
      const pool = getPool();
      const selected = shuffle(pool).slice(0, Math.min(state.questionLimit, pool.length));
      state.queue = selected.map(getQuestionId);
      state.index = 0;
      state.answers = [];
      state.currentAnswered = false;
      state.active = true;
      state.showStudyAnswer = false;
      saveState();
      renderQuiz();
    }

    function renderQuiz() {
      if (!state.queue.length || state.index >= state.queue.length) {
        renderResults();
        return;
      }

      const mode = MODES[state.mode];
      const q = getQuestionById(state.queue[state.index]);
      const currentAnswer = state.answers.find(a => a.id === state.queue[state.index]);
      const progress = Math.round((state.index / state.queue.length) * 100);
      const isStudy = state.mode === "study";

      pageTitle.textContent = mode.title;
      pageSubtitle.textContent = mode.subtitle;
      startButton.style.display = "none";

      screen.innerHTML = `
        <div class="quiz-shell">
          <div class="panel progress-card">
            <div class="progress-row">
              <span>Pregunta ${state.index + 1} de ${state.queue.length}</span>
              <span>${state.answers.filter(a => a.correct).length} correctas</span>
            </div>
            <div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div>
          </div>

          <article class="panel question-card">
            <div class="chips">
              <span class="chip">${escapeHtml(q.cat)}</span>
              ${q.tip ? '<span class="chip hot">Entrevista real</span>' : ""}
            </div>
            <h3 class="question-text">${escapeHtml(q.q)}</h3>

            ${isStudy ? renderStudy(q) : renderOptions(q, currentAnswer)}

            <div id="feedback" class="feedback"></div>

            <div class="actions">
              <button class="plain-button" type="button" id="menuButton">Cambiar filtros</button>
              <div class="toolbar">
                ${state.index > 0 ? '<button class="plain-button" type="button" id="backButton">Anterior</button>' : ""}
                <button class="primary-button" type="button" id="nextButton">${state.index === state.queue.length - 1 ? "Ver resultados" : "Siguiente"}</button>
              </div>
            </div>
          </article>
        </div>
      `;

      if (isStudy) wireStudy(q);
      else wireOptions(q, currentAnswer);

      const nextButton = document.getElementById("nextButton");
      nextButton.disabled = !isStudy && state.mode !== "exam" && !currentAnswer;
      nextButton.addEventListener("click", nextQuestion);

      const backButton = document.getElementById("backButton");
      if (backButton) backButton.addEventListener("click", previousQuestion);

      document.getElementById("menuButton").addEventListener("click", () => {
        state.active = false;
        saveState();
        renderApp();
      });
    }

    function renderStudy(q) {
      return `
        <div class="study-answer ${state.showStudyAnswer ? "show" : ""}" id="studyAnswer">
          <div class="answer-label">Respuesta</div>
          <strong>${escapeHtml(q.opts[q.ans])}</strong>
          <p>${escapeHtml(q.exp)}</p>
        </div>
        <button class="plain-button" type="button" id="revealButton">${state.showStudyAnswer ? "Ocultar respuesta" : "Revelar respuesta"}</button>
      `;
    }

    function wireStudy(q) {
      document.getElementById("revealButton").addEventListener("click", () => {
        state.showStudyAnswer = !state.showStudyAnswer;
        saveState();
        renderQuiz();
      });
      if (!state.answers.find(a => a.id === state.queue[state.index])) {
        state.answers.push({ id: state.queue[state.index], selected: q.ans, correct: true, study: true });
        state.seen += 1;
        saveState();
      }
    }

    function renderOptions(q, currentAnswer) {
      return `
        <div class="options">
          ${q.opts.map((opt, i) => {
            const answered = Boolean(currentAnswer);
            const isCorrect = answered && i === q.ans;
            const isWrong = answered && i === currentAnswer.selected && !currentAnswer.correct;
            const dimmed = answered && !isCorrect && !isWrong;
            return `
              <button class="option-button ${isCorrect ? "correct" : ""} ${isWrong ? "wrong" : ""} ${dimmed ? "dimmed" : ""}" type="button" data-index="${i}" ${answered ? "disabled" : ""}>
                <span class="option-key">${String.fromCharCode(65 + i)}</span>
                <span>${escapeHtml(opt)}</span>
              </button>
            `;
          }).join("")}
        </div>
      `;
    }

    function wireOptions(q, currentAnswer) {
      document.querySelectorAll(".option-button").forEach(button => {
        button.addEventListener("click", () => chooseAnswer(Number(button.dataset.index)));
      });

      if (currentAnswer && state.mode === "practice") {
        showFeedback(q, currentAnswer.correct);
      }
    }

    function chooseAnswer(selected) {
      const id = state.queue[state.index];
      const q = getQuestionById(id);
      if (state.answers.find(a => a.id === id)) return;
      const correct = selected === q.ans;
      state.answers.push({ id, selected, correct });
      state.seen += 1;
      saveState();
      renderQuiz();
    }

    function showFeedback(q, correct) {
      const feedback = document.getElementById("feedback");
      feedback.className = "feedback show " + (correct ? "correct" : "wrong");
      feedback.innerHTML = `
        <strong>${correct ? "Correcto." : "Casi."}</strong>
        ${escapeHtml(q.exp)}
      `;
      document.getElementById("nextButton").disabled = false;
    }

    function nextQuestion() {
      const isExam = state.mode === "exam";
      const hasAnswer = state.answers.find(a => a.id === state.queue[state.index]);
      if (!isExam && state.mode !== "study" && !hasAnswer) return;
      if (isExam && !hasAnswer) {
        chooseAnswer(-1);
        return;
      }
      state.index += 1;
      state.showStudyAnswer = false;
      saveState();
      renderQuiz();
    }

    function previousQuestion() {
      state.index = Math.max(0, state.index - 1);
      state.showStudyAnswer = false;
      saveState();
      renderQuiz();
    }

    function renderResults() {
      const total = state.queue.length || 1;
      const realAnswers = state.answers.filter(a => !a.study);
      const correct = state.mode === "study"
        ? total
        : realAnswers.filter(a => a.correct).length;
      const pct = state.mode === "study" ? 100 : Math.round((correct / total) * 100);
      state.bestScore = Math.max(state.bestScore || 0, pct);
      state.active = false;
      saveState();

      const title = pct >= 85 ? "Muy buen nivel" : pct >= 65 ? "Buen avance" : "Repaso recomendado";
      const copy = pct >= 85
        ? "Ya tienes una base fuerte para defender los temas clave del rol."
        : pct >= 65
          ? "Vas bien. Conviene repetir las categorías donde hubo más dudas."
          : "Mejor concentrar una vuelta más en fundamentos y escenarios reales.";

      pageTitle.textContent = "Resultados";
      pageSubtitle.textContent = "Aquí tienes tu cierre de sesión y los puntos para repasar.";
      startButton.style.display = "inline-flex";
      startButton.textContent = "Nueva sesión";

      const breakdown = buildBreakdown();
      const misses = state.answers
        .filter(a => !a.correct && !a.study)
        .map(a => ({ ...a, question: getQuestionById(a.id) }));

      screen.innerHTML = `
        <div class="panel results">
          <div class="score-hero">
            <div class="score-number">${pct}%</div>
            <div class="score-copy">
              <h3>${title}</h3>
              <p>${copy}</p>
            </div>
          </div>

          <section>
            <h3 class="section-heading">Por categoría</h3>
            <div class="breakdown">
              ${breakdown.map(item => `
                <div class="breakdown-item">
                  <div class="breakdown-name">${escapeHtml(item.cat)}</div>
                  <div class="category-meta"><span>${item.correct}/${item.total}</span><span>${item.pct}%</span></div>
                  <div class="mini-track"><div class="mini-fill" style="width:${item.pct}%"></div></div>
                </div>
              `).join("")}
            </div>
          </section>

          <section>
            <h3 class="section-heading">Errores para repasar</h3>
            ${misses.length ? `
              <div class="review-list">
                ${misses.map(item => `
                  <div class="review-item">
                    <strong>${escapeHtml(item.question.q)}</strong>
                    <div class="category-meta">
                      <span>Tu respuesta: ${item.selected >= 0 ? escapeHtml(item.question.opts[item.selected]) : "Sin responder"}</span>
                      <span>Correcta: ${escapeHtml(item.question.opts[item.question.ans])}</span>
                    </div>
                    <p>${escapeHtml(item.question.exp)}</p>
                  </div>
                `).join("")}
              </div>
            ` : '<div class="empty">Sin errores en esta sesión.</div>'}
          </section>

          <div class="actions">
            <button class="plain-button" type="button" id="setupAgainButton">Cambiar filtros</button>
            <button class="primary-button" type="button" id="retryButton">Repetir modo</button>
          </div>
        </div>
      `;

      document.getElementById("setupAgainButton").addEventListener("click", renderSetup);
      document.getElementById("retryButton").addEventListener("click", startSession);
    }

    function buildBreakdown() {
      const map = new Map();
      state.answers.forEach(answer => {
        const q = getQuestionById(answer.id);
        if (!map.has(q.cat)) map.set(q.cat, { cat: q.cat, total: 0, correct: 0 });
        const item = map.get(q.cat);
        item.total += 1;
        if (answer.correct) item.correct += 1;
      });
      return [...map.values()].map(item => ({
        ...item,
        pct: Math.round((item.correct / item.total) * 100)
      }));
    }

    function renderApp() {
      renderModes();
      updateStats();
      if (state.active && state.queue.length) renderQuiz();
      else renderSetup();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    startButton.addEventListener("click", () => {
      if (state.active && state.queue.length) renderQuiz();
      else startSession();
    });

    resetProgressButton.addEventListener("click", () => {
      if (!confirm("¿Reiniciar progreso guardado y mejor score?")) return;
      state = structuredClone(defaultState);
      localStorage.removeItem(STORAGE_KEY);
      renderApp();
    });

    document.addEventListener("keydown", (event) => {
      if (!state.active || state.mode === "study") return;
      const key = Number(event.key);
      if (key >= 1 && key <= 4) {
        const currentId = state.queue[state.index];
        if (!state.answers.find(a => a.id === currentId)) chooseAnswer(key - 1);
      }
      if (event.key === "Enter") {
        const nextButton = document.getElementById("nextButton");
        if (nextButton && !nextButton.disabled) nextQuestion();
      }
    });

    renderApp();
  </script>
</body>
</html>
